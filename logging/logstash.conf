input {
  file {
    path => "/var/log/digitaltwin/*.log"
    start_position => "beginning"
    codec => json
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "digitaltwin-logs-%{+YYYY.MM.dd}"
  }
}
