input {
  # Docker JSON log driver output
  file {
    path => "/var/log/digitaltwin/*.log"
    start_position => "beginning"
    codec => json
    tags => ["file"]
  }

  # Accept structured JSON logs directly via TCP (from Docker log driver)
  tcp {
    port => 5044
    codec => json_lines
    tags => ["tcp"]
  }
}

filter {
  # Parse timestamp from .NET JSON console logger
  if [Timestamp] {
    date {
      match => ["Timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
      target => "@timestamp"
    }
  } else if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Map .NET log levels to standard severity
  if [LogLevel] {
    mutate {
      rename => { "LogLevel" => "level" }
    }
  }

  # Extract service name from container or category
  if [Category] {
    mutate {
      add_field => { "service_category" => "%{Category}" }
    }
  }

  # Add service identification
  if [container_name] {
    mutate {
      add_field => { "service" => "%{container_name}" }
    }
  }

  # Extract trace context from OpenTelemetry spans
  if [TraceId] {
    mutate {
      rename => { "TraceId" => "trace.id" }
      rename => { "SpanId" => "trace.span_id" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "digitaltwin-logs-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "digitaltwin-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "digitaltwin-logs-policy"
  }
}
