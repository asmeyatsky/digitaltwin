# Redis configuration

# Network
bind 0.0.0.0
port 6379
protected-mode yes

# Authentication
requirepass redis_password

# Memory management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence - Append Only File
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# Logging
loglevel notice
