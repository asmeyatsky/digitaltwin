version: '3.8'

services:
  # API Gateway Service
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digitaltwin-api
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=digitaltwin;Username=${DB_USER};Password=${DB_PASSWORD}
      - JwtConfiguration__PrivateKeyPath=/app/keys/jwt-private.pem
      - JwtConfiguration__PublicKeyPath=/app/keys/jwt-public.pem
      - JwtConfiguration__Issuer=DigitalTwin
      - JwtConfiguration__Audience=DigitalTwin
      - JwtConfiguration__ExpiryInMinutes=60
      - Redis__ConnectionString=redis:${REDIS_PORT:-6379},password=${REDIS_PASSWORD}
      - RabbitMQ__ConnectionString=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/digitaltwin
      - Services__DeepFace__BaseUrl=http://deepface:8001
      - Services__Avatar__BaseUrl=http://avatar-generation:8002
      - Services__Voice__BaseUrl=http://voice-service:8003
      - Services__LLM__BaseUrl=http://llm-service:8004
      - Services__ServiceKey=${SERVICE_API_KEY}
      - OTEL__ExporterOtlpEndpoint=http://jaeger:4317
      - Encryption__Key=${ENCRYPTION_KEY}
      - Stripe__SecretKey=${STRIPE_SECRET_KEY}
      - Stripe__PlusPriceId=${STRIPE_PLUS_PRICE_ID}
      - Stripe__PremiumPriceId=${STRIPE_PREMIUM_PRICE_ID}
      - Stripe__WebhookSecret=${STRIPE_WEBHOOK_SECRET}
      - Stripe__SuccessUrl=${STRIPE_SUCCESS_URL}
      - Stripe__CancelUrl=${STRIPE_CANCEL_URL}
      - CORS__AllowedOrigins=http://localhost:3000,http://localhost:8081,http://localhost:19006,http://localhost:80
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      deepface:
        condition: service_healthy
      avatar-generation:
        condition: service_healthy
      voice-service:
        condition: service_healthy
      llm-service:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: digitaltwin-postgres
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8
    user: "${DB_UID:-999}:${DB_GID:-999}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    # Internal service - no host port mapping needed
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-postgres} -d $${DB_NAME:-digitaltwin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: digitaltwin-redis
    # Internal service - no host port mapping needed
    user: "redis:redis"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: digitaltwin-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=digitaltwin
    # Internal service - management port only for development
    ports:
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: digitaltwin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: digitaltwin-prometheus
    # Internal service - no host port mapping needed
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.4.0
    container_name: digitaltwin-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Elasticsearch for Logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.5.0
    container_name: digitaltwin-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    # Internal service - no host port mapping needed
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.5.0
    container_name: digitaltwin-kibana
    # Internal service - no host port mapping needed
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Logstash for Log Processing
  logstash:
    image: docker.elastic.co/logstash/logstash:8.5.0
    container_name: digitaltwin-logstash
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
      - ./logs:/var/log/digitaltwin
    depends_on:
      - elasticsearch
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # Jaeger Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: digitaltwin-jaeger
    # Internal service - no host port mapping needed
    ports:
      - "16686:16686"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # MinIO Object Storage
  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: digitaltwin-minio
    # Internal service - no host port mapping needed
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - digitaltwin-network
    restart: unless-stopped

  # DeepFace Emotion Recognition Service
  deepface:
    build:
      context: ./services/deepface-service
      dockerfile: Dockerfile
    container_name: digitaltwin-deepface
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - TF_CPP_MIN_LOG_LEVEL=2
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # Avatar Generation Service (3D face reconstruction)
  avatar-generation:
    build:
      context: ./services/avatar-generation-service
      dockerfile: Dockerfile
    container_name: digitaltwin-avatar-gen
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
      - AVATAR_STORAGE_PATH=/app/avatars
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - avatar_data:/app/avatars
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Voice Service (ElevenLabs TTS + Voice Cloning)
  voice-service:
    build:
      context: ./services/voice-service
      dockerfile: Dockerfile
    container_name: digitaltwin-voice
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - VOICE_STORAGE_PATH=/app/voices
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - voice_data:/app/voices
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # LLM Service (Empathetic Response Generation)
  llm-service:
    build:
      context: ./services/llm-service
      dockerfile: Dockerfile
      args:
        INCLUDE_LOCAL_EMBEDDINGS: ${INCLUDE_LOCAL_EMBEDDINGS:-false}
    container_name: digitaltwin-llm
    ports:
      - "8004:8004"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - digitaltwin-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  minio_data:
    driver: local
  avatar_data:
    driver: local
  voice_data:
    driver: local

networks:
  digitaltwin-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16