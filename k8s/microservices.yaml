# Microservice deployments for the 4 Python services
# that the .NET API gateway calls.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitaltwin-deepface
  namespace: digitaltwin
  labels:
    app: digitaltwin-deepface
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digitaltwin-deepface
  template:
    metadata:
      labels:
        app: digitaltwin-deepface
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: deepface
        image: digitaltwin/deepface-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: TF_CPP_MIN_LOG_LEVEL
          value: "2"
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: service-api-key
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: cors-origins
              optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: digitaltwin-deepface-service
  namespace: digitaltwin
spec:
  selector:
    app: digitaltwin-deepface
  ports:
  - port: 8001
    targetPort: 8001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitaltwin-avatar
  namespace: digitaltwin
  labels:
    app: digitaltwin-avatar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digitaltwin-avatar
  template:
    metadata:
      labels:
        app: digitaltwin-avatar
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: avatar
        image: digitaltwin/avatar-generation-service:latest
        ports:
        - containerPort: 8002
        env:
        - name: AVATAR_STORAGE_PATH
          value: "/data/avatars"
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: service-api-key
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: cors-origins
              optional: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: avatar-storage
          mountPath: /data/avatars
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: avatar-storage
        persistentVolumeClaim:
          claimName: avatar-storage-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: digitaltwin-avatar-service
  namespace: digitaltwin
spec:
  selector:
    app: digitaltwin-avatar
  ports:
  - port: 8002
    targetPort: 8002
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: avatar-storage-pvc
  namespace: digitaltwin
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: fast-ssd
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitaltwin-voice
  namespace: digitaltwin
  labels:
    app: digitaltwin-voice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digitaltwin-voice
  template:
    metadata:
      labels:
        app: digitaltwin-voice
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: voice
        image: digitaltwin/voice-service:latest
        ports:
        - containerPort: 8003
        env:
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: elevenlabs-api-key
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: service-api-key
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: cors-origins
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: digitaltwin-voice-service
  namespace: digitaltwin
spec:
  selector:
    app: digitaltwin-voice
  ports:
  - port: 8003
    targetPort: 8003
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitaltwin-llm
  namespace: digitaltwin
  labels:
    app: digitaltwin-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digitaltwin-llm
  template:
    metadata:
      labels:
        app: digitaltwin-llm
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8004"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
      - name: llm
        image: digitaltwin/llm-service:latest
        ports:
        - containerPort: 8004
        env:
        - name: LLM_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: llm-provider
              optional: true
        - name: LLM_MODEL
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: llm-model
              optional: true
        - name: EMBEDDING_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: embedding-provider
              optional: true
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: anthropic-api-key
              optional: true
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: google-api-key
              optional: true
        - name: SERVICE_API_KEY
          valueFrom:
            secretKeyRef:
              name: digitaltwin-secrets
              key: service-api-key
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: digitaltwin-config
              key: cors-origins
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: digitaltwin-llm-service
  namespace: digitaltwin
spec:
  selector:
    app: digitaltwin-llm
  ports:
  - port: 8004
    targetPort: 8004
  type: ClusterIP
