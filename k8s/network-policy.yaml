# Network Policies for Digital Twin namespace
# Deny all ingress by default, then allow specific traffic patterns.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: digitaltwin
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-infrastructure
  namespace: digitaltwin
spec:
  podSelector:
    matchLabels:
      app: digitaltwin-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: ingress-nginx
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 8080
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow traffic to PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow traffic to Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow traffic to RabbitMQ
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672
    - protocol: TCP
      port: 15672
  # Allow traffic to Python services (deepface, avatar, voice, llm)
  - to:
    - podSelector:
        matchLabels:
          app: deepface
    - podSelector:
        matchLabels:
          app: avatar
    - podSelector:
        matchLabels:
          app: voice
    - podSelector:
        matchLabels:
          app: llm
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 8002
    - protocol: TCP
      port: 8003
  # Allow all egress within the namespace
  - to:
    - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-infrastructure-from-api
  namespace: digitaltwin
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - postgres
      - redis
      - rabbitmq
      - deepface
      - avatar
      - voice
      - llm
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: digitaltwin-api
